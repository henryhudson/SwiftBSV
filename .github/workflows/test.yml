name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a new push lands —
# avoids racing duplicate jobs and consuming Actions minutes during
# rapid pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # macos-15 ships Xcode 16.x by default; pin to a current toolchain
        # so test runs are reproducible across runner image updates.
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Swift version
        run: swift --version

      - name: swift build
        run: swift build -v

      - name: swift test
        run: swift test -v
